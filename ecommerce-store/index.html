<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<nav>
    <div class="logo">ShopEase</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <div class="cart">
        <i class="fas fa-shopping-cart"></i>
        <span id="count">0</span>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Big Summer Sale</h1>
        <p>Up to 50% Off On Electronics</p>
        <button>Shop Now</button>
    </div>
</section>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500" alt="">
        <h3>Laptop</h3>
        <p>₹45,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" alt="">
        <h3>Smartphone</h3>
        <p>₹20,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="">
        <h3>Headphones</h3>
        <p>₹2,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
